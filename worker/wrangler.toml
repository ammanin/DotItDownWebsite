# Cloudflare Worker for contact form – sends email via Cloudflare Email Routing
# Docs: https://developers.cloudflare.com/email-routing/email-workers/send-email-workers/
#
# Setup:
# 1. In Cloudflare dashboard: add your domain, enable Email Routing, add a verified destination address.
# 2. Set SENDER_EMAIL to an address on your domain (e.g. noreply@yourdomain.com).
# 3. Set the send_email destination_address and DESTINATION_EMAIL to the address where you want to receive submissions.
# 4. Deploy: from this folder run  npm install  then  npx wrangler deploy
# 5. In Cloudflare dashboard, add a route for your zone, e.g. yourdomain.com/api/contact

name = "dotitdown-contact"
main = "src/index.js"
compatibility_date = "2024-01-01"

# Where to send contact form emails (must be a verified Email Routing destination)
[[send_email]]
name = "CONTACT"
destination_address = "you@example.com"

[vars]
# Sender must be an address on the domain where Email Routing is enabled
SENDER_EMAIL = "noreply@yourdomain.com"
# Must match the destination_address above (where you receive the emails)
DESTINATION_EMAIL = "you@example.com"
